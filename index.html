<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빵별 — Bread Planet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading">
    <div class="loading-oven">
      <div class="oven-body">
        <div class="oven-window"></div>
        <div class="oven-bread">🍞</div>
      </div>
      <div class="oven-steam">~</div>
      <div class="oven-steam s2">~</div>
      <div class="oven-steam s3">~</div>
    </div>
    <div class="loading-text">빵 굽는 중...</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>

  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="location">빵별</div>
    <div id="hint">WASD / 방향키로 이동</div>
    <div id="enter-prompt" class="hidden">E 를 눌러 들어가기</div>
  </div>

  <!-- Info panel -->
  <div id="info" class="hidden">
    <div id="info-close">×</div>
    <h3 id="info-title"></h3>
    <p id="info-desc"></p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
