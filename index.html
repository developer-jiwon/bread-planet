<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빵별 — Bread Planet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading">
    <div class="flying-breads">
      <div class="fly-bread" style="--d:0s;--x:10%;--y:20%;--r:25deg;--s:60px">🥖</div>
      <div class="fly-bread" style="--d:0.3s;--x:75%;--y:15%;--r:-15deg;--s:55px">🥐</div>
      <div class="fly-bread" style="--d:0.6s;--x:85%;--y:60%;--r:40deg;--s:50px">🍞</div>
      <div class="fly-bread" style="--d:0.9s;--x:20%;--y:70%;--r:-30deg;--s:45px">🥨</div>
      <div class="fly-bread" style="--d:1.2s;--x:50%;--y:10%;--r:10deg;--s:65px">🧁</div>
      <div class="fly-bread" style="--d:1.5s;--x:90%;--y:35%;--r:-45deg;--s:40px">🍩</div>
      <div class="fly-bread" style="--d:0.2s;--x:30%;--y:85%;--r:35deg;--s:55px">🥯</div>
      <div class="fly-bread" style="--d:0.8s;--x:65%;--y:80%;--r:-20deg;--s:48px">🍰</div>
      <div class="fly-bread" style="--d:1.1s;--x:5%;--y:45%;--r:50deg;--s:52px">🧇</div>
      <div class="fly-bread" style="--d:1.4s;--x:45%;--y:50%;--r:-10deg;--s:70px">🥮</div>
    </div>
    <div class="loading-center">
      <div class="loading-title">빵별</div>
      <div class="loading-sub">빵 굽는 중...</div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
  </div>

  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="location">빵별</div>
    <div id="hint">WASD / 방향키로 이동</div>
    <div id="enter-prompt" class="hidden">E 를 눌러 들어가기</div>
  </div>

  <!-- Info panel -->
  <div id="info" class="hidden">
    <div id="info-close">×</div>
    <h3 id="info-title"></h3>
    <p id="info-desc"></p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
