<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빵별 — Bread Planet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading">
    <div class="loading-center">
      <div class="oven">
        <div class="oven-body">
          <div class="oven-door">
            <div class="oven-glass">
              <div class="oven-glow"></div>
              <img class="oven-bread b1" src="/assets/croissant-projectile.png" alt="">
              <img class="oven-bread b2" src="/assets/baguette-projectile.png" alt="">
              <img class="oven-bread b3" src="/assets/pretzel-projectile.png" alt="">
            </div>
          </div>
          <div class="oven-handle"></div>
        </div>
        <div class="oven-steam s1">~</div>
        <div class="oven-steam s2">~</div>
        <div class="oven-steam s3">~</div>
      </div>
      <div class="loading-title">빵별</div>
      <div class="loading-sub">빵 굽는 중...</div>
      <div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>
    </div>
  </div>

  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="location">빵별</div>
    <div id="hint">WASD / 방향키로 이동</div>
    <div id="enter-prompt" class="hidden">E 를 눌러 들어가기</div>
  </div>

  <!-- Info panel -->
  <div id="info" class="hidden">
    <div id="info-close">×</div>
    <h3 id="info-title"></h3>
    <p id="info-desc"></p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
